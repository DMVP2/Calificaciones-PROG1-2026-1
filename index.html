<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Programación 1 · Notas Corte 3</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Oxanium:wght@300;400;600;800&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg:          #08040a;
      --orange:      #ff6a00;
      --orange-dim:  #cc5500;
      --orange-pale: #ff9a45;
      --amber:       #ffb700;
      --amber-dim:   #cc9200;
      --red-neon:    #ff3c00;
      --red-dim:     #cc3000;
      --yellow:      #ffe066;
      --white:       #fff3e0;
      --glow-o:  0 0 8px #ff6a00, 0 0 22px #ff6a0066;
      --glow-a:  0 0 8px #ffb700, 0 0 22px #ffb70066;
      --glow-r:  0 0 8px #ff3c00, 0 0 22px #ff3c0066;
      --glow-y:  0 0 8px #ffe066, 0 0 22px #ffe06644;
      --font-mono: 'Share Tech Mono', monospace;
      --font-main: 'Oxanium', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg); color: var(--white);
      font-family: var(--font-main); min-height: 100vh;
      overflow-x: hidden; cursor: none;
    }

    /* ── Custom cursor ── */
    .cursor {
      position: fixed; top: 0; left: 0; width: 12px; height: 12px;
      background: var(--orange); border-radius: 50%; pointer-events: none;
      z-index: 9999; box-shadow: var(--glow-o);
      transition: transform 0.1s, background 0.2s; transform: translate(-50%, -50%);
    }
    .cursor-ring {
      position: fixed; top: 0; left: 0; width: 36px; height: 36px;
      border: 1px solid var(--orange); border-radius: 50%; pointer-events: none;
      z-index: 9998; opacity: 0.5; transform: translate(-50%, -50%);
      transition: transform 0.15s ease, width 0.2s, height 0.2s, border-color 0.2s;
    }

    /* ── Scanlines overlay ── */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none; z-index: 100;
    }

    /* ── Grid bg ── */
    .grid-bg {
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,106,0,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,106,0,0.04) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none; z-index: 0;
    }

    /* ── Ambient blobs ── */
    .blob { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; z-index: 0; animation: drift 18s ease-in-out infinite alternate; }
    .blob-1 { width:500px; height:500px; background:var(--orange);  top:-120px; left:-120px; animation-duration:20s; }
    .blob-2 { width:400px; height:400px; background:var(--amber);   bottom:-100px; right:-100px; animation-duration:26s; }
    .blob-3 { width:350px; height:350px; background:var(--red-neon); top:45%; left:55%; animation-duration:16s; }
    @keyframes drift { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(40px,30px) scale(1.08); } }
    main { position: relative; z-index: 1; }

    /* ── Header ── */
    header { padding: 60px 24px 40px; text-align: center; }
    .badge {
      display: inline-block; font-family: var(--font-mono); font-size: 0.7rem;
      color: var(--orange); border: 1px solid var(--orange); padding: 4px 14px;
      letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 20px;
      box-shadow: var(--glow-o); animation: pulse-border 3s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%,100% { box-shadow: var(--glow-o); }
      50%      { box-shadow: 0 0 18px #ff6a00, 0 0 48px #ff6a0044; }
    }
    h1 { font-size: clamp(1.6rem,5vw,3.6rem); font-weight: 800; line-height: 1.05; letter-spacing: -0.02em; text-transform: uppercase; }
    h1 .line-orange { color: var(--orange); text-shadow: var(--glow-o); }
    h1 .line-white  { color: var(--white); }
    .subtitle { margin-top: 16px; font-family: var(--font-mono); font-size: 0.85rem; color: #7a5a3a; letter-spacing: 0.1em; }
    .subtitle span { color: var(--amber); text-shadow: var(--glow-a); }

    /* ── Divider ── */
    .divider { display: flex; align-items: center; gap: 16px; max-width: 700px; margin: 40px auto; padding: 0 24px; }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; }
    .divider::before { background: linear-gradient(90deg, transparent, var(--amber)); }
    .divider::after  { background: linear-gradient(90deg, var(--amber), transparent); }
    .divider-icon { width: 8px; height: 8px; background: var(--amber); transform: rotate(45deg); box-shadow: var(--glow-a); flex-shrink: 0; }

    /* ── Status bar ── */
    #statusBar {
      max-width: 600px; margin: 0 auto 16px; padding: 0 24px;
      font-family: var(--font-mono); font-size: 0.72rem; letter-spacing: 0.12em;
      text-align: center; min-height: 20px;
    }
    #statusBar.loading { color: var(--amber); }
    #statusBar.ready   { color: var(--orange-pale); }
    #statusBar.error   { color: var(--red-neon); }

    /* ── Search ── */
    .search-section { max-width: 600px; margin: 0 auto 48px; padding: 0 24px; text-align: center; }
    .search-label { font-family: var(--font-mono); font-size: 0.75rem; color: var(--amber); letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 12px; display: block; }
    .search-wrap { position: relative; display: flex; align-items: center; }
    .search-prompt { font-family: var(--font-mono); font-size: 1rem; color: var(--orange); padding: 0 0 0 18px; position: absolute; pointer-events: none; text-shadow: var(--glow-o); }
    #searchInput {
      width: 100%; background: rgba(255,106,0,0.04); border: 1px solid var(--orange);
      border-radius: 0; color: var(--orange-pale); font-family: var(--font-mono);
      font-size: 1.1rem; padding: 14px 14px 14px 42px; outline: none;
      letter-spacing: 0.1em; box-shadow: inset 0 0 20px rgba(255,106,0,0.06), var(--glow-o);
      transition: box-shadow 0.3s, background 0.3s; caret-color: var(--amber);
    }
    #searchInput:focus {
      background: rgba(255,106,0,0.09);
      box-shadow: inset 0 0 30px rgba(255,106,0,0.12), 0 0 20px #ff6a0066, 0 0 60px #ff6a0022;
    }
    #searchInput::placeholder { color: #3a1a00; }
    #searchInput:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── Result card ── */
    #result { max-width: 680px; margin: 0 auto 64px; padding: 0 24px; display: none; }
    #result.visible { display: block; animation: fadeUp 0.4s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

    .card {
      border: 1px solid #1a0a00; background: rgba(10,4,0,0.94);
      padding: 0; overflow: hidden; position: relative;
    }
    .card::before {
      content:''; position:absolute; top:0; left:0; right:0; height:2px;
      background: linear-gradient(90deg, var(--red-neon), var(--orange), var(--amber), var(--yellow));
    }

    /* ── Card header ── */
    .card-header {
      padding: 24px 28px 20px; border-bottom: 1px solid #1a0800;
      display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px;
    }
    .student-name { font-size: 1.15rem; font-weight: 600; color: var(--white); letter-spacing: 0.05em; }
    .student-id   { font-family: var(--font-mono); font-size: 0.8rem; color: var(--orange); margin-top: 4px; }
    .corte-badge  { font-family: var(--font-mono); font-size: 0.7rem; color: var(--amber); border: 1px solid var(--amber); padding: 4px 12px; letter-spacing: 0.15em; box-shadow: var(--glow-a); }

    /* ── Scores grid: 3 columnas ── */
    .scores-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid #1a0800; }
    .score-block { padding: 20px 22px; border-right: 1px solid #1a0800; }
    .score-block:last-child { border-right: none; }
    .score-label  { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.15em; text-transform: uppercase; color: #5a3010; margin-bottom: 8px; }
    .score-value  { font-size: 1.8rem; font-weight: 800; line-height: 1; }
    .score-weight { font-family: var(--font-mono); font-size: 0.65rem; color: #3a1a00; margin-top: 6px; }
    .col-orange .score-value { color: var(--orange);   text-shadow: var(--glow-o); }
    .col-amber  .score-value { color: var(--amber);    text-shadow: var(--glow-a); }
    .col-red    .score-value { color: var(--red-neon); text-shadow: var(--glow-r); }

    /* ── Breakdown ── */
    .breakdown { padding: 20px 28px; border-bottom: 1px solid #1a0800; }
    .breakdown-title { font-family: var(--font-mono); font-size: 0.65rem; color: #5a3010; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 14px; }
    .item-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid #120600; font-size: 0.88rem; }
    .item-row:last-child { border-bottom: none; }
    .item-name  { color: #9a6040; }
    .item-val   { font-family: var(--font-mono); font-size: 0.9rem; font-weight: 600; }
    .v-orange { color: var(--orange); }
    .v-amber  { color: var(--amber); }
    .v-red    { color: var(--red-neon); }
    .v-yellow { color: var(--yellow); }
    .bar-wrap { width:80px; height:4px; background:#120600; margin-left:16px; flex-shrink:0; }
    .bar-fill { height:100%; transition: width 0.8s ease; }
    .bar-orange { background:var(--orange); box-shadow:var(--glow-o); }
    .bar-amber  { background:var(--amber);  box-shadow:var(--glow-a); }
    .bar-red    { background:var(--red-neon); box-shadow:var(--glow-r); }

    /* ── Autoevaluación / Heteroevaluación ── */
    .eval-grid { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #1a0800; }
    .eval-block { padding: 16px 22px; border-right: 1px solid #1a0800; }
    .eval-block:last-child { border-right: none; }
    .eval-label { font-family: var(--font-mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase; color: #5a3010; margin-bottom: 6px; }
    .eval-val   { font-size: 1.5rem; font-weight: 700; }
    .eval-amber  .eval-val { color: var(--amber);    text-shadow: var(--glow-a); }
    .eval-yellow .eval-val { color: var(--yellow);   text-shadow: var(--glow-y); }

    /* ── Finals ── */
    .finals { display: grid; grid-template-columns: 1fr 1fr; }
    .final-block { padding: 24px 28px; border-right: 1px solid #1a0800; text-align: center; }
    .final-block:last-child { border-right: none; }
    .final-label { font-family: var(--font-mono); font-size: 0.65rem; letter-spacing: 0.2em; color: #5a3010; text-transform: uppercase; margin-bottom: 10px; }
    .final-big   { font-size: 3rem; font-weight: 800; line-height: 1; }
    .final-def  .final-big  { color: var(--orange); text-shadow: 0 0 12px #ff6a00, 0 0 44px #ff6a0066; }
    .final-sala .final-big  { color: var(--amber);  text-shadow: 0 0 12px #ffb700, 0 0 44px #ffb70066; }
    .final-sub { font-family: var(--font-mono); font-size: 0.7rem; margin-top: 6px; }
    .final-def  .final-sub  { color: var(--orange-dim); }
    .final-sala .final-sub  { color: var(--amber-dim); }

    /* ── Bono strip ── */
    .bono-strip {
      padding: 12px 28px; border-top: 1px solid #1a0800;
      display: flex; justify-content: space-between; align-items: center;
      font-family: var(--font-mono); font-size: 0.75rem; color: #5a3010;
      background: rgba(255,183,0,0.03); flex-wrap: wrap; gap: 8px;
    }
    .bono-strip .bval { color: var(--amber); font-size: 0.9rem; font-weight: 600; }

    .not-found { text-align: center; padding: 40px 28px; font-family: var(--font-mono); color: var(--red-neon); text-shadow: var(--glow-r); }

    footer {
      text-align: center; padding: 32px 24px 48px; border-top: 1px solid #1a0800;
      font-family: var(--font-mono); font-size: 0.7rem; color: #3a1a00; position: relative; z-index: 1;
    }
    footer span { color: #5a3010; }

    @media (max-width: 600px) {
      .scores-grid { grid-template-columns: 1fr 1fr; }
      .scores-grid .score-block:nth-child(3) { grid-column: 1 / -1; }
      .eval-grid  { grid-template-columns: 1fr; }
      .eval-block { border-right: none; border-bottom: 1px solid #1a0800; }
      .finals { grid-template-columns: 1fr; }
      .final-block { border-right: none; border-bottom: 1px solid #1a0800; }
      .final-block:last-child { border-bottom: none; }
      .bono-strip { font-size: 0.68rem; }
    }
  </style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>
<div class="grid-bg"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<main>
  <header>
    <div class="badge">CORTE 3 · 2026-1</div>
    <h1>
      <span class="line-orange">Programación 1</span><br>
      <span class="line-white">Notas Corte 3</span>
    </h1>
    <p class="subtitle">
      Grupo <span>1M</span> &nbsp;·&nbsp;
      David Mauricio Valoyes Porras &nbsp;·&nbsp;
      Universidad El Bosque
    </p>
  </header>

  <div class="divider"><div class="divider-icon"></div></div>

  <div id="statusBar" class="loading">&gt;_ cargando planilla...</div>

  <section class="search-section">
    <span class="search-label">// consulta tu nota</span>
    <div class="search-wrap">
      <span class="search-prompt">&gt;_</span>
      <input
        type="text"
        id="searchInput"
        placeholder="Ingresa tu número de documento..."
        autocomplete="off"
        spellcheck="false"
        disabled
      />
    </div>
  </section>

  <div id="result"></div>
</main>

<footer>
  <span>Programación 1 · Semestre 2026-1 · Grupo 1M</span>
  &nbsp;·&nbsp; Universidad El Bosque
</footer>

<script>
// ── Helpers ───────────────────────────────────────────────────────────
function n(v) {
  if (v === null || v === undefined || v === '') return null;
  if (typeof v === 'string' && (v.includes('#') || v.trim() === '')) return null;
  const p = parseFloat(v);
  return isNaN(p) ? null : p;
}
const fmt  = v => v !== null ? v.toFixed(2) : '—';
const fmt1 = v => v !== null ? v.toFixed(1)  : '—';
const fmt3 = v => v !== null ? v.toFixed(3) : '—';

function bar(val, max, cls) {
  const pct = val !== null ? Math.min(100, (val / max) * 100) : 0;
  return `<div class="bar-wrap"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
}

function renderCard(s) {
  const bonos = s.bonos !== null && s.bonos > 0 ? '+' + s.bonos.toFixed(2) : '0.00';
  const falt  = s.falta === 'No aplica' ? 'No aplica'
              : s.falta !== null ? s.falta.toFixed(2) : '—';

  return `
  <div class="card">
    <div class="card-header">
      <div>
        <div class="student-name">${s.nombre}</div>
        <div class="student-id">ID: ${s.id}</div>
      </div>
      <div class="corte-badge">CORTE 3</div>
    </div>

    <!-- Resumen 3 bloques principales -->
    <div class="scores-grid">
      <div class="score-block col-orange">
        <div class="score-label">Trabajos</div>
        <div class="score-value">${fmt3(s.nt_total)}</div>
        <div class="score-weight">Peso × 0.20</div>
      </div>
      <div class="score-block col-amber">
        <div class="score-label">Proyecto</div>
        <div class="score-value">${fmt(s.proyecto_pond)}</div>
        <div class="score-weight">Peso × 0.40</div>
      </div>
      <div class="score-block col-red">
        <div class="score-label">Parcial</div>
        <div class="score-value">${fmt(s.parcial)}</div>
        <div class="score-weight">Peso × 0.40</div>
      </div>
    </div>

    <!-- Desglose ítems -->
    <div class="breakdown">
      <div class="breakdown-title">// desglose de ítems</div>
      <div class="item-row">
        <span class="item-name">Taller 7</span>
        <div style="display:flex;align-items:center">
          <span class="item-val v-orange">${fmt(s.taller7)}</span>
          ${s.taller7!==null?bar(s.taller7,5,'bar-orange'):''}
        </div>
      </div>
      <div class="item-row">
        <span class="item-name">Taller 8</span>
        <div style="display:flex;align-items:center">
          <span class="item-val v-orange">${fmt(s.taller8)}</span>
          ${s.taller8!==null?bar(s.taller8,5,'bar-orange'):''}
        </div>
      </div>
      <div class="item-row">
        <span class="item-name">Proyecto (nota)</span>
        <div style="display:flex;align-items:center">
          <span class="item-val v-amber">${fmt(s.proyecto)}</span>
          ${s.proyecto!==null?bar(s.proyecto,5,'bar-amber'):''}
        </div>
      </div>
      <div class="item-row">
        <span class="item-name">Parcial</span>
        <div style="display:flex;align-items:center">
          <span class="item-val v-red">${fmt(s.parcial)}</span>
          ${s.parcial!==null?bar(s.parcial,5,'bar-red'):''}
        </div>
      </div>
    </div>

    <!-- Autoevaluación / Heteroevaluación -->
    <div class="eval-grid">
      <div class="eval-block eval-amber">
        <div class="eval-label">Autoevaluación</div>
        <div class="eval-val">${fmt(s.autoevaluacion)}</div>
      </div>
      <div class="eval-block eval-yellow">
        <div class="eval-label">Heteroevaluación</div>
        <div class="eval-val">${fmt(s.heteroevaluacion)}</div>
      </div>
    </div>

    <!-- Definitiva y Nota a sala -->
    <div class="finals">
      <div class="final-block final-def">
        <div class="final-label">// definitiva</div>
        <div class="final-big">${fmt(s.def)}</div>
        <div class="final-sub">nota calculada</div>
      </div>
      <div class="final-block final-sala">
        <div class="final-label">// nota a sala</div>
        <div class="final-big">${fmt1(s.sala)}</div>
        <div class="final-sub">sistema SALA</div>
      </div>
    </div>

    <div class="bono-strip">
      <span>Total bonos: <span class="bval">${bonos}</span></span>
      <span>Para aprobar: <span class="bval">${falt}</span></span>
    </div>
  </div>`;
}

// ── Índices de columna (base 0) en hoja "Corte 3" ────────────────────
// A(0)=id, C(2)=nombre,
// E(4)=taller7, F(5)=taller8, G(6)=nt_trabajos_pond,
// H(7)=proyecto, I(8)=proyecto_pond,
// J(9)=parcial,
// K(10)=autoevaluacion, L(11)=heteroevaluacion, M(12)=nt_total,
// N(13)=actividad_bonos, O(14)=total_bonos,
// P(15)=def, Q(16)=sala, R(17)=falta
const CI = {
  id: 0, nombre: 2,
  taller7: 4, taller8: 5, nt_trab_pond: 6,
  proyecto: 7, proyecto_pond: 8,
  parcial: 9,
  autoevaluacion: 10, heteroevaluacion: 11, nt_total: 12,
  actividad_bonos: 13, bonos: 14,
  def: 15, sala: 16, falta: 17
};
const DATA_START_ROW = 7; // fila 8 del Excel → índice 7

let DATA   = [];
let LOADED = false;

async function loadExcel() {
  const status = document.getElementById('statusBar');
  const input  = document.getElementById('searchInput');
  try {
    status.className = 'loading';
    status.textContent = '>_ conectando con la planilla...';

    const FILENAME = 'Corte_3.xlsx';
    const resp = await fetch(FILENAME);
    if (!resp.ok) throw new Error(`No se encontró "${FILENAME}" (HTTP ${resp.status})`);

    const buffer = await resp.arrayBuffer();
    const wb = XLSX.read(buffer, { type: 'array', cellText: false });

    const sheetName = wb.SheetNames.find(n => n.trim() === 'Corte 3');
    if (!sheetName) throw new Error(`Hoja "Corte 3" no encontrada. Disponibles: ${wb.SheetNames.join(', ')}`);

    const ws   = wb.Sheets[sheetName];
    const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

    DATA = rows
      .slice(DATA_START_ROW)
      .filter(row => row[CI.id] !== null && row[CI.id] !== undefined && row[CI.id] !== '')
      .map(row => {
        const rawId  = String(row[CI.id]).replace(/\.0+$/, '').replace(/\xa0/g, '').trim();
        const nombre = String(row[CI.nombre] || '').replace(/\xa0/g, '').trim();

        let falta = null;
        const rawFalta = row[CI.falta];
        if (rawFalta !== null && rawFalta !== undefined && rawFalta !== '') {
          if (typeof rawFalta === 'string' && rawFalta.toLowerCase().includes('aplica')) {
            falta = 'No aplica';
          } else {
            falta = n(rawFalta);
          }
        }

        return {
          id:               rawId,
          nombre:           nombre,
          taller7:          n(row[CI.taller7]),
          taller8:          n(row[CI.taller8]),
          nt_trab_pond:     n(row[CI.nt_trab_pond]),
          proyecto:         n(row[CI.proyecto]),
          proyecto_pond:    n(row[CI.proyecto_pond]),
          parcial:          n(row[CI.parcial]),
          autoevaluacion:   n(row[CI.autoevaluacion]),
          heteroevaluacion: n(row[CI.heteroevaluacion]),
          nt_total:         n(row[CI.nt_total]),
          bonos:            n(row[CI.bonos]),
          def:              n(row[CI.def]),
          sala:             n(row[CI.sala]),
          falta:            falta,
        };
      })
      .filter(s => s.id);

    LOADED = true;
    status.className = 'ready';
    status.textContent = `>_ planilla lista · ${DATA.length} estudiantes`;
    input.disabled = false;
    input.focus();

  } catch (err) {
    status.className = 'error';
    status.textContent = `>_ ERROR: ${err.message}`;
    console.error(err);
  }
}

// ── Búsqueda ──────────────────────────────────────────────────────────
document.getElementById('searchInput').addEventListener('input', function() {
  if (!LOADED) return;
  const q      = this.value.trim().replace(/\D/g, '');
  const result = document.getElementById('result');
  if (!q || q.length < 4) { result.classList.remove('visible'); return; }

  const found = DATA.find(s => s.id === q || s.id.startsWith(q));
  result.classList.add('visible');

  if (found) {
    result.innerHTML = renderCard(found);
    setTimeout(() => {
      result.querySelectorAll('.bar-fill').forEach(b => {
        const w = b.style.width; b.style.width = '0';
        requestAnimationFrame(() => { b.style.width = w; });
      });
    }, 50);
  } else {
    result.innerHTML = `<div class="card"><div class="not-found">
      &gt;_ DOCUMENTO NO ENCONTRADO<br>
      <span style="color:#3a1a00;font-size:0.8rem">Verifica tu número e intenta de nuevo</span>
    </div></div>`;
  }
});

// ── Cursor personalizado ──────────────────────────────────────────────
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove', e => {
  mx=e.clientX; my=e.clientY;
  cursor.style.left=mx+'px'; cursor.style.top=my+'px';
});
function animRing() {
  rx+=(mx-rx)*0.12; ry+=(my-ry)*0.12;
  ring.style.left=rx+'px'; ring.style.top=ry+'px';
  requestAnimationFrame(animRing);
}
animRing();
document.querySelectorAll('a,button,input').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.transform='translate(-50%,-50%) scale(2)';
    ring.style.width='56px'; ring.style.height='56px';
    ring.style.borderColor='var(--amber)'; cursor.style.background='var(--amber)';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.transform='translate(-50%,-50%) scale(1)';
    ring.style.width='36px'; ring.style.height='36px';
    ring.style.borderColor='var(--orange)'; cursor.style.background='var(--orange)';
  });
});

loadExcel();
</script>
